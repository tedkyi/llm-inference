project:
  type: book
  output-dir: _book

book:
  title: "LLM Inference Illustrated"
  description: "A book about autoregressive LLM inference and the techniques that make it fast, efficient, and scalable"
  author: "Ted Kyi"
  twitter-card: true
  repo-url: https://github.com/tedkyi/llm-inference/
  repo-actions: [issue]
  downloads: [pdf]
  sharing: [twitter, facebook]
  date: today
  date-format: "[Version dated] YYYY-MM-DD"
  license: "CC BY-NC-SA"
  chapters:
    - index.qmd
    - chapters/preface.qmd
    - chapters/conventions.qmd
    - chapters/intro.qmd
    - chapters/decoder-only-llm.qmd
    - chapters/inference.qmd
    - chapters/model-design.qmd
    - chapters/scheduling.qmd
    - chapters/request.qmd
    - chapters/scaling.qmd
    - chapters/production.qmd
  # appendices:
    - chapters/references.qmd

bibliography: references.bib
link-citations: true

filters:
  - _filters/dim-colors.lua

lightbox: auto

format:
  html:
    theme: cosmo
    css: _styles/dim-colors.css
    code-tools: false
    toc-depth: 3
    number-depth: 2
  pdf:
    documentclass: scrbook
    classoption: [oneside]
    pdf-engine: lualatex
    toc-depth: 2
    number-depth: 1
    number-sections: true
    colorlinks: true
    geometry:
      - margin=1.2in
    include-in-header:
      text: |
        \usepackage{float}
        \usepackage{caption}
        \usepackage[table]{xcolor}
        \definecolor{dim-s}{HTML}{DC2626}
        \definecolor{dim-d}{HTML}{1E40AF}
        \definecolor{dim-h}{HTML}{A855F7}
        \definecolor{dim-dk}{HTML}{2563EB}
        \definecolor{dim-f}{HTML}{059669}
        \definecolor{dim-v}{HTML}{D97706}
        \definecolor{dim-l}{HTML}{8B4513}
        \definecolor{dim-hkv}{HTML}{C084FC}
        \definecolor{dim-one}{HTML}{F9A8D4}
        \definecolor{edge-dk}{HTML}{93C5FD}
        \definecolor{edge-default}{HTML}{1E3A5F}
        \definecolor{fill-neutral}{HTML}{F3F4F6}
        \definecolor{stroke-neutral}{HTML}{6B7280}
        \definecolor{fill-query}{HTML}{EFF6FF}
        \definecolor{fill-key}{HTML}{FFF8E1}
        \definecolor{fill-value}{HTML}{FEE2E2}
        \definecolor{fill-attn}{HTML}{D1FAE5}
        \definecolor{fill-weight}{HTML}{F3E8FF}
        \definecolor{fill-kvcache}{HTML}{FEF3C7}
        \definecolor{comp-embed}{HTML}{FCE0E1}
        \definecolor{comp-attn}{HTML}{FFE2BB}
        \definecolor{comp-ffn}{HTML}{C2E8F7}
        \definecolor{comp-norm}{HTML}{F2F4C1}
        \definecolor{comp-linear}{HTML}{DBDFEF}
        \definecolor{comp-softmax}{HTML}{CCE7CF}
        \definecolor{stroke-dark}{HTML}{333333}
        \newcommand{\dims}[1]{\textcolor{dim-s}{#1}}
        \newcommand{\dimd}[1]{\textcolor{dim-d}{#1}}
        \newcommand{\dimh}[1]{\textcolor{dim-h}{#1}}
        \newcommand{\dimdk}[1]{\textcolor{dim-dk}{#1}}
        \newcommand{\dimf}[1]{\textcolor{dim-f}{#1}}
        \newcommand{\dimv}[1]{\textcolor{dim-v}{#1}}
        \newcommand{\dimb}[1]{\textcolor{black}{#1}}
        \newcommand{\diml}[1]{\textcolor{dim-l}{#1}}
        \newcommand{\dimhkv}[1]{\textcolor{dim-hkv}{#1}}
        \newcommand{\dimone}[1]{\textcolor{dim-one}{#1}}
        \let\realmainmatter\mainmatter
        \renewcommand{\mainmatter}{}
    filters:
      - _latex/mainmatter.lua
