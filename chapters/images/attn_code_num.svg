<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="670px" version="1.1" viewBox="0 0 632 670" width="632px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrowhead" markerHeight="4" markerWidth="4" orient="auto" refX="4" refY="2.0"><polygon fill="#374151" points="0,0 4,2.0 0,4" /></marker></defs><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="29.0">1</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="29.0"><tspan font-weight="bold">def</tspan><tspan> forward(self, x):</tspan></text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="47.0">2</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="47.0">    # Store batch size, sequence length, model dimension</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="65.0">3</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="65.0"><tspan>    B, S, D = x.size()</tspan></text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="83.0">4</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="101.0">5</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="101.0">    # Calculate query, key, values for all heads in batch</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="119.0">6</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="119.0">    # (B, S, D) x (D, 3D) -&gt; (B, S, 3D) -&gt; 3 separate (B, S, D)</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="137.0">7</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="137.0"><tspan>    q, k, v  = self.c_attn(x).split(self.n_embd, dim=</tspan><tspan fill="#B91C1C">2</tspan><tspan>)</tspan></text><circle cx="602" cy="137.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="137.0">7</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="155.0">8</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="173.0">9</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="173.0">    # Split out and transpose head forward next to the batch dim</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="191.0">10</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="191.0">    # (B, S, D) -&gt; (B, H, S, d_k) where d_k = D / H</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="209.0">11</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="209.0"><tspan>    q = q.view(B, S, self.n_head, D // self.n_head).transpose(</tspan><tspan fill="#B91C1C">1</tspan><tspan>, </tspan><tspan fill="#B91C1C">2</tspan><tspan>)</tspan></text><circle cx="602" cy="209.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="209.0">11</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="227.0">12</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="227.0"><tspan>    k = k.view(B, S, self.n_head, D // self.n_head).transpose(</tspan><tspan fill="#B91C1C">1</tspan><tspan>, </tspan><tspan fill="#B91C1C">2</tspan><tspan>)</tspan></text><circle cx="602" cy="227.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="227.0">12</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="245.0">13</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="245.0"><tspan>    v = v.view(B, S, self.n_head, D // self.n_head).transpose(</tspan><tspan fill="#B91C1C">1</tspan><tspan>, </tspan><tspan fill="#B91C1C">2</tspan><tspan>)</tspan></text><circle cx="602" cy="245.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="245.0">13</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="263.0">14</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="281.0">15</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="281.0">    # Calculate scores for self-attention</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="299.0">16</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="299.0">    # (B, H, S, d_k) x (B, H, d_k, S) -&gt; (B, H, S, S)</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="317.0">17</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="317.0"><tspan>    att = (q @ k.transpose(-</tspan><tspan fill="#B91C1C">2</tspan><tspan>, -</tspan><tspan fill="#B91C1C">1</tspan><tspan>)) * (</tspan><tspan fill="#B91C1C">1.0</tspan><tspan> / math.sqrt(k.size(-</tspan><tspan fill="#B91C1C">1</tspan><tspan>)))</tspan></text><circle cx="602" cy="317.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="317.0">17</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="335.0">18</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="353.0">19</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="353.0">    # Causal mask and SoftMax</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="371.0">20</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="371.0">    # (B, H, S, S)</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="389.0">21</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="389.0"><tspan>    att = att.masked_fill(self.bias[:,:,:S,:S] == </tspan><tspan fill="#B91C1C">0</tspan><tspan>, float('-inf'))</tspan></text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="407.0">22</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="407.0"><tspan>    att = F.softmax(att, dim=-</tspan><tspan fill="#B91C1C">1</tspan><tspan>)</tspan></text><circle cx="602" cy="407.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="407.0">22</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="425.0">23</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="443.0">24</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="443.0">    # Combine values by attention weights</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="461.0">25</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="461.0">    # (B, H, S, S) x (B, H, S, d_k) -&gt; (B, H, S, d_k)</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="479.0">26</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="479.0"><tspan>    y = att @ v</tspan></text><circle cx="602" cy="479.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="479.0">26</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="497.0">27</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="515.0">28</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="515.0">    # Re-assemble weighted values from all heads side by side</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="533.0">29</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="533.0">    # (B, H, S, d_k) -&gt; (B, S, D)</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="551.0">30</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="551.0"><tspan>    y = y.transpose(</tspan><tspan fill="#B91C1C">1</tspan><tspan>, </tspan><tspan fill="#B91C1C">2</tspan><tspan>).contiguous().view(B, S, D)</tspan></text><circle cx="602" cy="551.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="551.0">30</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="569.0">31</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="587.0">32</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="587.0">    # Output projection</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="605.0">33</text><text dy="0.35em" fill="#15803D" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" font-style="italic" text-anchor="start" x="52" xml:space="preserve" y="605.0">    # (B, S, D) x (D, D) -&gt; (B, S, D)</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="623.0">34</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="623.0"><tspan>    y = self.resid_dropout(self.c_proj(y))</tspan></text><circle cx="602" cy="623.0" fill="#1F2937" r="10" stroke="white" stroke-width="1.5" /><text dy="0.35em" fill="white" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="11px" font-weight="bold" text-anchor="middle" x="602" y="623.0">34</text><text dy="0.35em" fill="#6B7280" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="11px" text-anchor="end" x="42" y="641.0">35</text><text dy="0.35em" fill="#1F2937" font-family="Consolas, Menlo, 'Courier New', monospace" font-size="13px" text-anchor="start" x="52" xml:space="preserve" y="641.0"><tspan>    </tspan><tspan font-weight="bold">return</tspan><tspan> y</tspan></text></svg>